name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check gofmt (changed files)
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          base="$PR_BASE_SHA"
          if [ -z "$base" ]; then
            base="$PUSH_BEFORE_SHA"
          fi
          if [ -z "$base" ]; then
            echo "No base SHA available; skipping gofmt check."
            exit 0
          fi
          if [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "Base SHA is empty (new branch); skipping gofmt check."
            exit 0
          fi

          files="$(git diff --diff-filter=d --name-only "$base" "$HEAD_SHA" -- '*.go' || true)"
          if [ -z "$files" ]; then
            echo "No Go files changed."
            exit 0
          fi

          unformatted="$(gofmt -l $files || true)"
          if [ -n "$unformatted" ]; then
            echo "gofmt required on:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        if: github.event_name == 'pull_request'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.2
          only-new-issues: true
          args: --timeout=5m

      - name: Run tests
        run: ./scripts/test.sh

      - name: Build CLI
        run: |
          set -euo pipefail
          mkdir -p dist/check-builds
          CGO_ENABLED=0 go build -o dist/check-builds/buckley ./cmd/buckley

  lint:
    name: Lint
    needs: test
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Confirm shared Go verification
        env:
          VERIFY_RESULT: ${{ needs.test.result }}
        run: test "$VERIFY_RESULT" = success

  build:
    name: Build (linux)
    needs: test
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Confirm shared Go verification
        env:
          VERIFY_RESULT: ${{ needs.test.result }}
        run: test "$VERIFY_RESULT" = success

  ui:
    name: UI Build (embedded)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.21'

      - name: Build embedded UI
        run: ./scripts/build-ui.sh

      - name: Ensure UI assets are up to date
        run: git diff --exit-code
